<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Writings — Bimbel Muda</title>
    <link rel="icon" type="image/png" href="/assets/img/bimbelmuda_logo.png" />
    <link href="/css/style.css" rel="stylesheet" />
  </head>

  <body
    class="min-h-screen flex flex-col bg-cover bg-center bg-no-repeat"
    style="background-image: url('/assets/img/3433812.webp')"
  >
    <nav class="absolute top-6 left-1/2 -translate-x-1/2 flex gap-5 sm:gap-10 z-10">
      <a href="/projects" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Projects</a>
      <a href="/writings" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Writings</a>
      <a href="/about" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">About</a>
    </nav>

    <header class="pt-14 px-4 sm:px-8">
      <a href="/" class="inline-block">
        <h1 class="text-3xl sm:text-5xl font-poppins font-semibold text-black">Bimbel Muda</h1>
      </a>
    </header>

    <main class="flex flex-1 flex-col px-4 sm:px-8 py-6">
      <div class="max-w-6xl mx-auto w-full">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
          <h2 class="text-2xl font-poppins font-semibold">Writings</h2>
        </div>

        <div id="post-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="col-span-full text-center text-gray-500 py-12">Loading posts...</div>
        </div>

        <div id="pagination" class="flex items-center justify-center gap-4 mt-8 pb-6 hidden">
          <button id="prev-btn" class="px-4 py-2 bg-white/70 border border-gray-300 text-sm rounded-full font-poppins hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">← Prev</button>
          <span id="page-info" class="text-sm font-poppins text-gray-700"></span>
          <button id="next-btn" class="px-4 py-2 bg-white/70 border border-gray-300 text-sm rounded-full font-poppins hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">Next →</button>
        </div>
      </div>
    </main>

    <footer class="bg-gray-200/80 text-center py-3 text-xs text-gray-600">
      &copy; 2026 Bimbel Muda
    </footer>

    <script src="/js/writings.js" defer></script>
  </body>
</html>
