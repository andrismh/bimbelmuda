<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bimbel Muda</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- NAV STARTS HERE! -->
    <nav id="navbar" class="navMenu">
      <a href="/projects">Projects</a>
      <a href="/writings">Writings</a>
      <a href="/about">About</a>
      <div class="dot"></div>
    </nav>

    <!-- PAGE CONTENT STARTS HERE! -->
    <!-- THIS IS HEADER -->
    <header>
      <div>
        <a href="/">
          <h1>Bimbel Muda</h1>
        </a>
      </div>
    </header>

    <!-- THIS IS MAIN -->
    <main>
      <div class="main-container">
        <form id="formRekapSPJ">
          <fieldset id="rekapSPJ">
            <legend>Form SPJ 2026</legend>
            <h5>Bidang</h5>
            <select id="selectBidang">
              <option value="">---Pilih Bidang---</option>
              <option value="Sekretariat">Sekretariat</option>
              <option value="Bina Administrasi Keuangan Daerah">Bina Administrasi Keuangan Daerah</option>
              <option value="Akuntansi">Akuntansi</option>
              <option value="Anggaran Belanja">Anggaran Belanja</option>
              <option value="Pengelola Kas Daerah">Pengelola Kas Daerah</option>
              <option value="Pengelola Barang Daerah">Pengelola Barang Daerah</option>
              <option value="Anggaran Pendapatan">Anggaran Pendapatan</option>
            </select>

            <h5>Kegiatan</h5>
            <select id="selectKegiatan">
              <option value="">---Pilih Kegiatan---</option>
            </select>

            <h5>Sub-Kegiatan</h5>
            <select id="selectSubKegiatan">
              <option value="">---Pilih Sub Kegiatan---</option>
            </select>

            <h5>Rekening Belanja</h5>
            <select id="selectRekeningBelanja">
              <option value="">---Pilih Rekening Belanja</option>
            </select>

            <h5>Nominal SPJ</h5>
            <input type="number" id="nominalSPJ" inputmode="numeric" min="0" placeholder="2.500.000" required>
          </fieldset>
        </form>        
      </div>
    </main>

    <!-- THIS IS FOOTER -->
    <footer id="footer" class="text-center">
      <div>
        <h6>This is freakin' footer.</h6>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <script src="../js/index.js"></script>
    <script src="../js/form-spj.js"></script>
  </body>
</html>
