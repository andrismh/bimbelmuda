<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form SPJ 2026 — Bimbel Muda</title>
    <link href="/css/style.css" rel="stylesheet" />
    <link href="/css/form-spj.css" rel="stylesheet" />
  </head>

  <body
    class="min-h-screen flex flex-col bg-cover bg-center bg-no-repeat"
    style="background-image: url('/assets/img/3433812.webp')"
  >
    <nav class="absolute top-6 left-1/2 -translate-x-1/2 flex gap-10 z-10">
      <a href="/projects" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Projects</a>
      <a href="/writings" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Writings</a>
      <a href="/about" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">About</a>
    </nav>

    <header class="pt-14 px-8">
      <a href="/" class="inline-block">
        <h1 class="text-5xl font-poppins font-semibold text-black">Bimbel Muda</h1>
      </a>
    </header>

    <main class="flex flex-1 items-center justify-center p-8">
      <div class="inline-flex flex-col justify-center bg-white/20 backdrop-blur-sm rounded-2xl p-8 gap-4">
        <form id="formRekapSPJ">
          <fieldset id="rekapSPJ">
            <legend>Form SPJ 2026</legend>
            <section class="section">
              <h5>Bidang</h5>
              <select id="selectBidang">
                <option value="">---Pilih Bidang---</option>
                <option value="Sekretariat">Sekretariat</option>
                <option value="Bina Administrasi Keuangan Daerah">Bina Administrasi Keuangan Daerah</option>
                <option value="Akuntansi">Akuntansi</option>
                <option value="Anggaran Belanja">Anggaran Belanja</option>
                <option value="Pengelola Kas Daerah">Pengelola Kas Daerah</option>
                <option value="Pengelola Barang Daerah">Pengelola Barang Daerah</option>
                <option value="Anggaran Pendapatan">Anggaran Pendapatan</option>
              </select>
            </section>

            <section class="section">
              <h5>Kegiatan</h5>
              <select id="selectKegiatan">
                <option value="">---Pilih Kegiatan---</option>
              </select>
            </section>

            <section class="section">
              <h5>Sub-Kegiatan</h5>
              <select id="selectSubKegiatan">
                <option value="">---Pilih Sub Kegiatan---</option>
              </select>
            </section>

            <section class="section">
              <h5>Rekening Belanja</h5>
              <select id="selectRekeningBelanja">
                <option value="">---Pilih Rekening Belanja</option>
              </select>
            </section>

            <section class="section">
              <h5>Nominal SPJ</h5>
              <input
                type="number"
                id="nominalSPJ"
                inputmode="numeric"
                min="0"
                placeholder="2.500.000"
                required
              />
            </section>
          </fieldset>
        </form>
      </div>
    </main>

    <footer class="bg-gray-200/80 text-center py-3 text-xs text-gray-600">
      &copy; 2026 Bimbel Muda
    </footer>

    <script src="/js/form-spj.js"></script>
  </body>
</html>
