<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalkulator Pajak PBJ — Bimbel Muda</title>
    <link href="/css/style.css" rel="stylesheet" />
    <link href="/css/tax-calculator.css" rel="stylesheet" />
  </head>

  <body
    class="min-h-screen flex flex-col bg-cover bg-center bg-no-repeat"
    style="background-image: url('/assets/img/3433812.webp')"
  >
    <nav class="absolute top-6 left-1/2 -translate-x-1/2 flex gap-10 z-10">
      <a href="/projects" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Projects</a>
      <a href="/writings" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">Writings</a>
      <a href="/about" class="text-black text-sm font-semibold uppercase tracking-widest hover:text-sky-400 transition-colors">About</a>
    </nav>

    <header class="pt-14 px-8">
      <a href="/" class="inline-block">
        <h1 class="text-5xl font-poppins font-semibold text-black">Bimbel Muda</h1>
      </a>
    </header>

    <main class="flex flex-1 items-center justify-center p-8">
      <div class="inline-flex flex-col justify-center bg-white/20 backdrop-blur-sm rounded-2xl p-8 gap-4 min-w-72">
        <fieldset id="nominal" class="section-input">
          <legend>Nominal SPJ/Bend 26</legend>
          <label for="nominalSPJ" class="sr-only">Nominal SPJ (Rp)</label>
          <input
            type="number"
            id="nominalSPJ"
            inputmode="numeric"
            placeholder="contoh: 2.500.000"
            required
          />
        </fieldset>

        <fieldset id="jenisBelanja" class="inline-flex flex-col justify-start">
          <legend>Jenis Belanja</legend>
          <label><input type="radio" name="belanja" value="barang" /> Barang</label>
          <label><input type="radio" name="belanja" value="jasa" /> Jasa</label>
        </fieldset>

        <fieldset id="jenisPajak" class="inline-flex flex-col justify-start">
          <legend>Jenis Pajak Penghasilan</legend>
          <label for="pajak" class="sr-only">Pilih jenis pajak</label>
          <select id="pajak" class="option" required>
            <option value="" disabled selected>Pilih pajak…</option>
          </select>
        </fieldset>

        <button id="hitung" type="button">Hitung</button>
        <section id="hasilSection">
          <h6>Dasar Pengenaan Pajak</h6>
          <div id="dpp" class="hasil" aria-live="polite"></div>
          <h6>Total PPh</h6>
          <div id="hasilPPh" class="hasil" aria-live="polite"></div>
          <h6>Total PPN</h6>
          <div id="hasilPPN" class="hasil" aria-live="polite" value="totalPPN"></div>
        </section>
      </div>
    </main>

    <footer class="bg-gray-200/80 text-center py-3 text-xs text-gray-600">
      &copy; 2026 Bimbel Muda
    </footer>

    <script src="/js/tax-calculator.js"></script>
  </body>
</html>
